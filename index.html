<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora & Elias | Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="sparkles" id="sparkles" aria-hidden="true"></div>

  <main class="invitation-page" id="top">
    <section class="hero" aria-label="Invitation envelope opening">
      <div class="envelope-scene" id="openEnvelope" aria-hidden="true">
        <span class="envelope-shadow"></span>
        <span class="envelope">
          <span class="envelope-flap"></span>
          <span class="gold-flower" aria-hidden="true"></span>
          <span class="envelope-lining"></span>
          <span class="envelope-front"></span>
          <span class="wax-seal" id="waxSeal">
            <span class="seal-monogram">AE</span>
            <span class="seal-ring"></span>
          </span>
        </span>
      </div>
      <p class="hero-hint" id="openHint">The envelope is opening…</p>
      <div class="title-card" id="titleCard" aria-live="polite">
        <p class="card-ornament">✦ ✦ ✦</p>
        <strong class="card-title">Wedding Invitation</strong>
        <h1 class="card-names">Aurora <span>&amp;</span> Elias</h1>
        <p class="card-ornament">✦ ✦ ✦</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
